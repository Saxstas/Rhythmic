<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Image Randomizer Pro</title>
    <style>
        /* --- СТИЛИ ИНТЕРФЕЙСА --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #1a1a2e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }

        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { color: #00cec9; text-transform: uppercase; letter-spacing: 2px; }

        .controls {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        select, button {
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        select { background: #2d2d44; color: white; border: 1px solid #3d3d5c; }

        #rollButton {
            background: linear-gradient(135deg, #00cec9, #0984e3);
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 206, 201, 0.3);
        }

        #rollButton:hover { transform: translateY(-2px); filter: brightness(1.1); }
        #rollButton:disabled { background: #444; cursor: not-allowed; transform: none; }

        /* --- СЕТКА КАРТИНОК --- */
        .grid {
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Выравнивание по нижней линии */
            gap: 20px;
            min-height: 250px;
            margin: 20px 0;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            overflow: hidden;
        }

        .image-card {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            border: 4px solid #3d3d5c;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .image-card.double-size {
            width: 420px; /* 200*2 + 20px gap */
            height: 200px;
            border-color: #fdcb6e;
        }

        .image-card.loaded { opacity: 1; }

        /* --- МЕТРОНОМ --- */
        .metronome-box {
            margin-top: 40px;
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .bpm-display { font-size: 28px; font-weight: bold; color: #fdcb6e; margin-bottom: 5px; }
        #bpmRange { width: 250px; margin: 15px 0; cursor: pointer; }

        .visual-beat {
            width: 15px;
            height: 15px;
            background: #333;
            border-radius: 50%;
            margin: 10px auto;
            transition: background 0.1s;
        }

        .visual-beat.active {
            background: #ff4757;
            box-shadow: 0 0 15px #ff4757;
        }

        #metronomeBtn { background: #2d3436; color: white; }
    </style>
</head>
<body>

<div class="main-container">
    <h1>🎰 RHYTMIC </h1>

    <div class="controls">
        <select id="difficulty">
            <option value="easy">Уровень 1 (Легкий)</option>
            <option value="medium">Уровень 2 (Средний)</option>
            <option value="hard">Уровень 3 (ХАРД)</option>
        </select>
        <button id="rollButton">ВРАЩАТЬ!</button>
    </div>

    <div id="imageContainer" class="grid"></div>

    <div class="metronome-box">
        <div class="bpm-display"><span id="bpmValue">120</span> BPM</div>
        <input type="range" id="bpmRange" min="30" max="240" value="120">
        <div class="visual-beat" id="beatIndicator"></div>
        <button id="metronomeBtn">Включить Метроном</button>
    </div>
</div>

<script>
    // --- 1. БАЗА ДАННЫХ ---
    const imageDatabase = {
        easy: [
            { src: "Size1/s1.png", size: 1 },
            { src: "Size1/2.png", size: 1 },
            { src: "Size1/3.png", size: 1 },
            { src: "Size1/4.png", size: 1 },
            { src: "Size1/5.png", size: 1 },
            { src: "Size2/6.png", size: 2 }, 
            { src: "Size2/7.png", size: 2 }, 
            { src: "Size2/8.png", size: 2 }, 
            { src: "Size2/9.png", size: 2 }, 
            { src: "Size2/10.png", size: 2 }, 
            { src: "Size2/11.png", size: 2 } 
        ],
        medium: [
            // Сюда можно добавить уникальные картинки для Medium
            { src: "lvl2/12.png", size: 1 },
            { src: "lvl2/13.png", size: 1 },
            { src: "lvl2/14.png", size: 1 },
            { src: "lvl2/15.png", size: 1 },
            { src: "lvl2/16.png", size: 1 },
            { src: "lvl2/17.png", size: 1 },
            { src: "lvl2/18.png", size: 1 },
            { src: "lvl2/19.png", size: 1 },
            { src: "lvl2/20.png", size: 1 },
            { src: "lvl2/21.png", size: 1 },
            { src: "lvl2/22.png", size: 1 },
            { src: "lvl2/23.png", size: 1 },
            { src: "lvl2/24.png", size: 1 },
            { src: "lvl2/25.png", size: 1 },
            { src: "lvl2/26.png", size: 1 },
            { src: "lvl2/27.png", size: 1 }
        ]
        // Hard не пишем здесь, он соберется программно ниже
    };

    const container = document.getElementById('imageContainer');
    const rollButton = document.getElementById('rollButton');
    const diffSelect = document.getElementById('difficulty');

    // --- 2. ЛОГИКА РАНДОМАЙЗЕРА ---
    function getFinalSelection(pool, maxSlots) {
        let result = [];
        let current = 0;
        const smalls = pool.filter(i => i.size === 1);

        while (current < maxSlots) {
            let img = pool[Math.floor(Math.random() * pool.length)];
            // Если остался 1 слот, а выпала двойная - заменяем на маленькую
            if (current + img.size > maxSlots) {
                img = smalls[Math.floor(Math.random() * smalls.length)];
            }
            result.push(img);
            current += img.size;
        }
        return result;
    }

    function render(list) {
        container.innerHTML = '';
        list.forEach(item => {
            const img = document.createElement('img');
            img.src = item.src;
            img.className = 'image-card';
            if (item.size === 2) img.classList.add('double-size');
            container.appendChild(img);
            setTimeout(() => img.classList.add('loaded'), 20);
        });
    }

    rollButton.addEventListener('click', () => {
        const val = diffSelect.value;
        // ХАРД = Easy + Medium
        const pool = (val === 'hard') 
            ? [...imageDatabase.easy, ...imageDatabase.medium] 
            : imageDatabase[val];

        rollButton.disabled = true;
        let ticks = 0;
        
        // Анимация
        const anim = setInterval(() => {
            const smalls = pool.filter(i => i.size === 1);
            const fake = Array.from({length: 4}, () => smalls[Math.floor(Math.random() * smalls.length)]);
            render(fake);
            ticks++;
            if (ticks > 12) {
                clearInterval(anim);
                render(getFinalSelection(pool, 4));
                rollButton.disabled = false;
            }
        }, 100);
    });

    // --- 3. ЛОГИКА МЕТРОНОМА ---
    let audioCtx = null;
    let isRunning = false;
    let nextBeat = 0;
    let bpm = 120;
    let timer = null;

    const bpmRange = document.getElementById('bpmRange');
    const bpmVal = document.getElementById('bpmValue');
    const metroBtn = document.getElementById('metronomeBtn');
    const indicator = document.getElementById('beatIndicator');

    bpmRange.addEventListener('input', (e) => {
        bpm = e.target.value;
        bpmVal.textContent = bpm;
    });

    function playTick() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.value = 1000;
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);

        indicator.classList.add('active');
        setTimeout(() => indicator.classList.remove('active'), 100);
    }

    function scheduler() {
        while (nextBeat < audioCtx.currentTime + 0.1) {
            playTick();
            nextBeat += 60.0 / bpm;
        }
        timer = setTimeout(scheduler, 25);
    }

    metroBtn.addEventListener('click', () => {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        isRunning = !isRunning;
        if (isRunning) {
            nextBeat = audioCtx.currentTime;
            scheduler();
            metroBtn.textContent = "Стоп";
            metroBtn.style.background = "#ff4757";
        } else {
            clearTimeout(timer);
            metroBtn.textContent = "Включить Метроном";
            metroBtn.style.background = "#2d3436";
        }
    });
</script>

</body>
</html>
