<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rhythmic Randomizer Pro</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            background-color: #1a1a2e;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
        }

        .main-container {
            width: 100%;
            max-width: 500px; /* Оптимально для телефона */
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 20px;
        }

        h1 { font-size: 1.4rem; color: #00cec9; text-transform: uppercase; margin: 10px 0; }

        .controls {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        select, button {
            padding: 10px 15px;
            font-size: 14px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }

        select { background: #2d2d44; color: white; flex: 1; min-width: 150px; }

        #rollButton {
            background: linear-gradient(135deg, #00cec9, #0984e3);
            color: white;
            font-weight: bold;
            flex: 1;
        }

        /* --- СЕТКА ДЛЯ МОБИЛЬНЫХ --- */
        .grid {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 1.5vw; /* Пропорциональный отступ */
            min-height: 120px;
            margin: 15px 0;
            padding: 10px 5px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            overflow: hidden;
        }

        .image-card {
            /* 4 картинки по ~22% ширины экрана, чтобы влезть с учетом отступов */
            width: 22vw; 
            height: 22vw;
            max-width: 120px;
            max-height: 120px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #3d3d5c;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .image-card.double-size {
            /* Сумма двух маленьких + отступ */
            width: calc(44vw + 1.5vw); 
            max-width: 255px;
            border-color: #fdcb6e;
        }

        .image-card.loaded { opacity: 1; }

        /* --- МЕТРОНОМ --- */
        .metronome-box {
            margin-top: 20px;
            padding: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .bpm-display { font-size: 22px; font-weight: bold; color: #fdcb6e; }
        #bpmRange { width: 90%; margin: 15px 0; }

        .visual-beat {
            width: 12px;
            height: 12px;
            background: #333;
            border-radius: 50%;
            margin: 5px auto;
        }

        .visual-beat.active { background: #ff4757; box-shadow: 0 0 10px #ff4757; }
        #metronomeBtn { background: #2d3436; color: white; width: 100%; max-width: 200px; }
    </style>
</head>
<body>

<div class="main-container">
    <h1>🎰 RHYTHMIC</h1>

    <div class="controls">
        <select id="difficulty">
            <option value="easy">Уровень 1</option>
            <option value="medium">Уровень 2</option>
            <option value="hard">Уровень 3 (ХАРД)</option>
        </select>
        <button id="rollButton">ВРАЩАТЬ!</button>
    </div>

    <div id="imageContainer" class="grid"></div>

    <div class="metronome-box">
        <div class="bpm-display"><span id="bpmValue">120</span> BPM</div>
        <input type="range" id="bpmRange" min="30" max="240" value="120">
        <div class="visual-beat" id="beatIndicator"></div>
        <button id="metronomeBtn">Включить Метроном</button>
    </div>
</div>

<script>
    // Инициализация Telegram
    const tg = window.Telegram.WebApp;
    tg.expand();

    const imageDatabase = {
        easy: [
            { src: "Size1/s1.png", size: 1 },
            { src: "Size1/2.png", size: 1 },
            { src: "Size1/3.png", size: 1 },
            { src: "Size1/4.png", size: 1 },
            { src: "Size1/5.png", size: 1 },
            { src: "Size2/6.png", size: 2 }, 
            { src: "Size2/7.png", size: 2 }, 
            { src: "Size2/8.png", size: 2 }, 
            { src: "Size2/9.png", size: 2 }, 
            { src: "Size2/10.png", size: 2 }, 
            { src: "Size2/11.png", size: 2 } 
        ],
        medium: [
            { src: "lvl2/12.png", size: 1 },
            { src: "lvl2/13.png", size: 1 },
            { src: "lvl2/14.png", size: 1 },
            { src: "lvl2/15.png", size: 1 },
            { src: "lvl2/16.png", size: 1 },
            { src: "lvl2/17.png", size: 1 },
            { src: "lvl2/18.png", size: 1 },
            { src: "lvl2/19.png", size: 1 },
            { src: "lvl2/20.png", size: 1 },
            { src: "lvl2/21.png", size: 1 },
            { src: "lvl2/22.png", size: 1 },
            { src: "lvl2/23.png", size: 1 },
            { src: "lvl2/24.png", size: 1 },
            { src: "lvl2/25.png", size: 1 },
            { src: "lvl2/26.png", size: 1 },
            { src: "lvl2/27.png", size: 1 }
        ]
    };

    const container = document.getElementById('imageContainer');
    const rollButton = document.getElementById('rollButton');
    const diffSelect = document.getElementById('difficulty');

    function getFinalSelection(pool, maxSlots) {
        let result = [];
        let currentSize = 0;
        const smalls = pool.filter(i => i.size === 1);

        while (currentSize < maxSlots) {
            let img = pool[Math.floor(Math.random() * pool.length)];
            if (currentSize + img.size > maxSlots) {
                img = smalls[Math.floor(Math.random() * smalls.length)];
            }
            result.push(img);
            currentSize += img.size;
        }
        return result;
    }

    function render(list) {
        container.innerHTML = '';
        list.forEach(item => {
            const img = document.createElement('img');
            img.src = item.src;
            img.className = 'image-card';
            if (item.size === 2) img.classList.add('double-size');
            container.appendChild(img);
            
            // Проверка загрузки для плавности
            img.onload = () => img.classList.add('loaded');
            if (img.complete) img.classList.add('loaded');
        });
    }

    rollButton.addEventListener('click', () => {
        // Легкая вибрация при нажатии (только в ТГ)
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

        const val = diffSelect.value;
        const pool = (val === 'hard') 
            ? [...imageDatabase.easy, ...imageDatabase.medium] 
            : imageDatabase[val];

        rollButton.disabled = true;
        let ticks = 0;
        const anim = setInterval(() => {
            const smalls = pool.filter(i => i.size === 1);
            const fake = Array.from({length: 4}, () => smalls[Math.floor(Math.random() * smalls.length)]);
            render(fake);
            ticks++;
            if (ticks > 10) {
                clearInterval(anim);
                render(getFinalSelection(pool, 4));
                rollButton.disabled = false;
            }
        }, 80);
    });

    // --- МЕТРОНОМ ---
    let audioCtx = null;
    let isRunning = false;
    let nextBeat = 0;
    let timer = null;

    function playTick() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.value = 1000;
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);

        const indicator = document.getElementById('beatIndicator');
        indicator.classList.add('active');
        setTimeout(() => indicator.classList.remove('active'), 100);
    }

    function scheduler() {
        const bpm = document.getElementById('bpmRange').value;
        while (nextBeat < audioCtx.currentTime + 0.1) {
            playTick();
            nextBeat += 60.0 / bpm;
        }
        timer = setTimeout(scheduler, 25);
    }

    document.getElementById('metronomeBtn').onclick = function() {
        if (!audioCtx) audioCtx = new AudioContext();
        isRunning = !isRunning;
        if (isRunning) {
            nextBeat = audioCtx.currentTime;
            scheduler();
            this.textContent = "Стоп";
            this.style.background = "#ff4757";
        } else {
            clearTimeout(timer);
            this.textContent = "Включить Метроном";
            this.style.background = "#2d3436";
        }
    };

    document.getElementById('bpmRange').oninput = function() {
        document.getElementById('bpmValue').textContent = this.value;
    };
</script>

</body>
</html>
